<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사이트 사용 제한 — Offlo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff8f5 0%, #ffffff 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1c1916;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(217, 119, 87, 0.12);
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 16px;
            line-height: 1;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #D97757;
            margin-bottom: 8px;
        }

        .domain-badge {
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            background: #fff3ee;
            color: #D97757;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 16px;
        }

        p {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .timer {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 28px;
        }

        .timer strong {
            color: #D97757;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-primary {
            display: block;
            padding: 13px;
            background: linear-gradient(135deg, #D97757, #e8956e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-back {
            display: block;
            padding: 11px;
            background: none;
            color: #aaa;
            border: 1px solid rgba(28, 25, 22, 0.1);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.15s;
        }

        .btn-back:hover {
            border-color: #D97757;
            color: #D97757;
        }

        .logo {
            margin-top: 28px;
            font-size: 12px;
            color: #ccc;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">🚫</div>
        <h1>차단 중입니다 🚫</h1>
        <div id="domain-badge" class="domain-badge">이 사이트</div>
        <p>
            설정한 차단 시간이 끝나면 자동으로 접속 가능해집니다.
        </p>
        <div class="timer">
            차단 해제까지: <strong id="remaining">계산 중...</strong>
        </div>
        <div class="btn-group">
            <a href="https://offlo-app.web.app/dashboard" class="btn-primary" target="_blank">
                🌿 Offlo 대시보드 보기
            </a>
            <button class="btn-back" id="btn-back">
                ← 이전 페이지로 돌아가기
            </button>
        </div>
        <div class="logo">Offlo - 건강한 디지털 습관</div>
    </div>

    <script src="blocked.js"></script>
</body>

</html>
