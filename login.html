<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — DetoxDay</title>
    <meta name="description" content="DetoxDay 로그인 페이지" />
    <link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet" />
    <style>
        /* ── 토큰 ── */
        :root {
            --primary: #D97757;
            --primary-dark: #C05E3A;
            --dark: #1C1916;
            --dark-2: #3D3730;
            --light: #FAF8F4;
            --light-2: #F0EDE8;
            --white: #FFFFFF;
            --text-muted: #7A7268;
            --text-light: #B0A898;
            --border: #E5E0D8;
            --font: 'Spoqa Han Sans Neo', -apple-system, sans-serif;
            --radius: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── 전체 래퍼 ── */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* ── 로고 & 헤더 ── */
        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(217, 119, 87, 0.35);
        }

        .login-logo svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 14.5px;
            color: var(--text-muted);
            margin-top: -8px;
        }

        /* ── 카드 ── */
        .login-card {
            width: 100%;
            background: var(--white);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 4px 24px rgba(28, 25, 22, 0.08), 0 1px 4px rgba(28, 25, 22, 0.04);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── 입력 필드 그룹 ── */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark-2);
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .field-icon svg {
            width: 16px;
            height: 16px;
        }

        .field-input {
            width: 100%;
            padding: 12px 44px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14.5px;
            color: var(--dark);
            background: var(--white);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .field-input::placeholder {
            color: var(--text-light);
        }

        .field-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.15);
        }

        .pw-toggle {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            display: flex;
            align-items: center;
            transition: color var(--transition);
            padding: 0;
        }

        .pw-toggle:hover {
            color: var(--dark);
        }

        .pw-toggle svg {
            width: 16px;
            height: 16px;
        }

        /* ── 기억하기 & 비밀번호 찾기 ── */
        .field-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .remember-wrap input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--primary);
            transition: color var(--transition);
        }

        .forgot-link:hover {
            color: var(--primary-dark);
        }

        /* ── 로그인 버튼 ── */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 4px 14px rgba(217, 119, 87, 0.35);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(217, 119, 87, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ── 구분선 ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-light);
            font-size: 12.5px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── 구글 버튼 ── */
        .btn-google {
            width: 100%;
            padding: 12px;
            background: var(--white);
            color: var(--dark);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background var(--transition), border-color var(--transition);
        }

        .btn-google:hover {
            background: var(--light);
            border-color: #c6c1b8;
        }

        .btn-google svg {
            width: 18px;
            height: 18px;
        }

        /* ── 하단 회원가입 링크 ── */
        .login-footer {
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            font-weight: 700;
            transition: color var(--transition);
        }

        .login-footer a:hover {
            color: var(--primary-dark);
        }

        /* ── 네비 홈 링크 ── */
        .nav-back {
            position: fixed;
            top: 20px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-2);
            transition: color var(--transition);
        }

        .nav-back:hover {
            color: var(--primary);
        }

        .nav-back-logo {
            color: var(--primary);
            font-size: 16px;
        }

        /* ── 반응형 ── */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- 홈으로 돌아가기 -->
    <a href="index.html" class="nav-back">
        <span class="nav-back-logo">◆</span>
        DetoxDay
    </a>

    <div class="login-wrapper">

        <!-- 헤더 -->
        <div class="login-header">
            <div class="login-logo">
                <!-- 방패 아이콘 -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.5C16.5 21.15 20 16.25 20 11V5l-8-3z" />
                </svg>
            </div>
            <h1 class="login-title">다시 만나서 반가워요</h1>
            <p class="login-subtitle">이메일과 비밀번호를 입력해 로그인하세요.</p>
        </div>

        <!-- 로그인 카드 -->
        <div class="login-card">

            <!-- 이메일 -->
            <div class="field-group">
                <label class="field-label" for="email">이메일 주소</label>
                <div class="field-wrap">
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                    </span>
                    <input id="email" type="email" class="field-input" placeholder="name@example.com"
                        autocomplete="email" />
                </div>
            </div>

            <!-- 비밀번호 -->
            <div class="field-group">
                <label class="field-label" for="password">비밀번호</label>
                <div class="field-wrap">
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input id="password" type="password" class="field-input" placeholder="••••••••"
                        autocomplete="current-password" />
                    <button class="pw-toggle" id="pw-toggle" type="button" aria-label="비밀번호 표시">
                        <!-- 눈 아이콘 -->
                        <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg id="icon-eye-off" style="display:none;" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 기억하기 & 비밀번호 찾기 -->
            <div class="field-meta">
                <label class="remember-wrap">
                    <input type="checkbox" id="remember" />
                    <span>로그인 상태 유지</span>
                </label>
                <a href="#" class="forgot-link">비밀번호 찾기</a>
            </div>

            <!-- 로그인 버튼 -->
            <button class="btn-login" id="btn-login" type="button">로그인</button>

            <!-- 구분선 -->
            <div class="divider">또는</div>

            <!-- 구글 로그인 -->
            <button class="btn-google" type="button">
                <!-- Google G 로고 -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Google로 계속하기
            </button>

        </div>

        <!-- 회원가입 링크 -->
        <p class="login-footer">
            아직 계정이 없으신가요? <a href="#">지금 가입하기</a>
        </p>

    </div>

    <script>
        // 비밀번호 표시/숨김 토글
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('password');
        const iconEye = document.getElementById('icon-eye');
        const iconEyeOff = document.getElementById('icon-eye-off');

        pwToggle.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            iconEye.style.display = isHidden ? 'none' : '';
            iconEyeOff.style.display = isHidden ? '' : 'none';
        });

        // 로그인 버튼 (임시: 홈으로 이동)
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            if (!email || !pw) {
                alert('이메일과 비밀번호를 입력해주세요.');
                return;
            }
            // TODO: 실제 인증 연동
            window.location.href = 'index.html';
        });
    </script>

</body>

</html>
